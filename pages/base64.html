<!doctype html>
<html>
  <head>
    <title>Base64</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7537203368232453"
     crossorigin="anonymous"></script>
  </head>
  <body>
    <h1>NetHacker Base64 encode & decode</h1>
    <p>press ENTER when you done the input</p>
    <br>
    <input placeholder="text here..." id="func_text" onchange="func_text(this.value)"><br>
    <input placeholder="base64 here..." id="func_base64" onchange="func_base64(this.value)"><br><br>
    <p>&copy; NeuralNexusLab NetHacker, All Rights Reserved.</p>
    <script>
      function func_text (str) {
        document.getElementById("func_base64").value = btoa(str);
      }
      function func_base64 (str) {
        document.getElementById("func_text").value = atob(str);
      }
    </script>
  </body>
</html>
